name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: xfer
            artifact: xfer-linux-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: xfer
            artifact: xfer-linux-x86_64-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: xfer
            artifact: xfer-linux-aarch64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            binary: xfer
            artifact: xfer-linux-aarch64-musl
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: xfer
            artifact: xfer-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: xfer
            artifact: xfer-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: xfer.exe
            artifact: xfer-windows-x86_64.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            binary: xfer.exe
            artifact: xfer-windows-aarch64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux cross toolchain
        if: runner.os == 'Linux' && matrix.target != 'x86_64-unknown-linux-gnu'
        uses: taiki-e/setup-cross-toolchain-action@v1.41.0
        with:
          target: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          key: release-${{ matrix.target }}

      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.artifact }}"
          openssl dgst -sha256 -r "dist/${{ matrix.artifact }}" > "dist/${{ matrix.artifact }}.sha256"

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v3.0.2
        with:
          generate_release_notes: true
          files: dist/*
