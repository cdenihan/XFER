name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release_metadata:
    name: Create release commit
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      cargo_version: ${{ steps.version_files.outputs.cargo_version }}
      commit: ${{ steps.commit.outputs.commit }}
      source_commit: ${{ steps.release.outputs.source_commit }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Generate daily release version
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          release_date="$(date -u +'%Y.%m.%d')"
          source_commit="$(git rev-parse HEAD)"
          for attempt in {1..10}; do
            release_version="$(
              gh api --paginate \
                "repos/${GITHUB_REPOSITORY}/git/matching-refs/tags/v${release_date}." \
                --jq '.[].ref' |
                sh scripts/next-release-version.sh "$release_date"
            )"
            if gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f "ref=refs/tags/v${release_version}" \
              -f "sha=${source_commit}" >/dev/null 2>&1; then
              break
            fi
            if [[ "$attempt" == "10" ]]; then
              echo "Could not reserve a release number after $attempt attempts." >&2
              exit 1
            fi
          done
          echo "version=${release_version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${release_version}" >> "$GITHUB_OUTPUT"
          echo "source_commit=${source_commit}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${release_version}"

      - name: Update repository versions
        id: version_files
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          cargo_version="$(
            python3 scripts/set-release-version.py "$RELEASE_VERSION"
          )"
          cargo metadata --locked --no-deps --format-version 1 >/dev/null
          echo "cargo_version=${cargo_version}" >> "$GITHUB_OUTPUT"
          echo "Cargo version: ${cargo_version}"

      - name: Commit and push release version
        id: commit
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock VERSION
          git commit --allow-empty -m "chore(release): XFER ${RELEASE_VERSION}"
          git push origin HEAD:main

          release_commit="$(git rev-parse HEAD)"
          gh api --method PATCH \
            "repos/${GITHUB_REPOSITORY}/git/refs/tags/${RELEASE_TAG}" \
            -f "sha=${release_commit}" \
            -F force=true >/dev/null
          echo "commit=${release_commit}" >> "$GITHUB_OUTPUT"
          echo "Release commit: ${release_commit}"

  build:
    name: Build ${{ matrix.target }}
    needs: release_metadata
    env:
      XFER_EXPECTED_VERSION: ${{ needs.release_metadata.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: xfer
            artifact: xfer-linux-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: xfer
            artifact: xfer-linux-x86_64-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: xfer
            artifact: xfer-linux-aarch64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            binary: xfer
            artifact: xfer-linux-aarch64-musl
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: xfer
            artifact: xfer-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: xfer
            artifact: xfer-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: xfer.exe
            artifact: xfer-windows-x86_64.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            binary: xfer.exe
            artifact: xfer-windows-aarch64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.release_metadata.outputs.commit }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux cross toolchain
        if: runner.os == 'Linux' && matrix.target != 'x86_64-unknown-linux-gnu'
        uses: taiki-e/setup-cross-toolchain-action@v1.41.0
        with:
          target: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          key: release-${{ matrix.target }}

      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Verify compiled release version
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: |
          reported_version="$("target/${{ matrix.target }}/release/${{ matrix.binary }}" --version)"
          expected_version="xfer ${XFER_EXPECTED_VERSION}"
          if [[ "$reported_version" != "$expected_version" ]]; then
            echo "Expected '$expected_version', got '$reported_version'" >&2
            exit 1
          fi

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.artifact }}"
          (
            cd dist
            openssl dgst -sha256 -r "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          )

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs:
      - release_metadata
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.release_metadata.outputs.commit }}

      - uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Add install scripts
        shell: bash
        run: |
          cp scripts/install.sh scripts/install.ps1 dist/
          chmod 0755 dist/install.sh
          (
            cd dist
            openssl dgst -sha256 -r install.sh > install.sh.sha256
            openssl dgst -sha256 -r install.ps1 > install.ps1.sha256
          )

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release_metadata.outputs.tag }}
          RELEASE_VERSION: ${{ needs.release_metadata.outputs.version }}
          RELEASE_COMMIT: ${{ needs.release_metadata.outputs.commit }}
        shell: bash
        run: |
          tagged_commit="$(
            gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" \
              --jq '.object.sha'
          )"
          if [[ "$tagged_commit" != "$RELEASE_COMMIT" ]]; then
            echo "Expected $RELEASE_TAG at $RELEASE_COMMIT, got $tagged_commit" >&2
            exit 1
          fi
          gh release create "$RELEASE_TAG" dist/* \
            --verify-tag \
            --title "XFER $RELEASE_VERSION" \
            --generate-notes

  cleanup_failed_tag:
    name: Clean up failed release reservation
    if: ${{ always() && needs.publish.result != 'success' }}
    needs:
      - release_metadata
      - build
      - publish
    runs-on: ubuntu-latest
    steps:
      - name: Delete this run's unused reserved tag
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release_metadata.outputs.tag }}
          RELEASE_COMMIT: ${{ needs.release_metadata.outputs.commit }}
          SOURCE_COMMIT: ${{ needs.release_metadata.outputs.source_commit }}
        shell: bash
        run: |
          if [[ -z "$RELEASE_TAG" ]] || gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            exit 0
          fi
          reserved_sha="$(
            gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" \
              --jq '.object.sha' 2>/dev/null || true
          )"
          if [[ "$reserved_sha" == "$SOURCE_COMMIT" ]] ||
            [[ -n "$RELEASE_COMMIT" && "$reserved_sha" == "$RELEASE_COMMIT" ]]; then
            gh api --method DELETE \
              "repos/${GITHUB_REPOSITORY}/git/refs/tags/${RELEASE_TAG}"
          fi
