name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: xfer
            artifact: xfer-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: xfer
            artifact: xfer-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: xfer.exe
            artifact: xfer-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy and verify artifact hash
        shell: bash
        run: |
          mkdir -p dist
          SRC="target/${{ matrix.target }}/release/${{ matrix.bin }}"
          DST="dist/${{ matrix.artifact }}"
          cp "$SRC" "$DST"
          SRC_HASH="$(sha256sum "$SRC" | awk '{print $1}')"
          DST_HASH="$(sha256sum "$DST" | awk '{print $1}')"
          if [ "$SRC_HASH" != "$DST_HASH" ]; then
            echo "Hash mismatch after copy, retrying copy..."
            cp "$SRC" "$DST"
            DST_HASH="$(sha256sum "$DST" | awk '{print $1}')"
            if [ "$SRC_HASH" != "$DST_HASH" ]; then
              echo "Artifact hash mismatch persists after retry."
              exit 1
            fi
          fi
          echo "$SRC_HASH  ${{ matrix.artifact }}" > "dist/${{ matrix.artifact }}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -type f -maxdepth 3 -exec cp {} release/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
