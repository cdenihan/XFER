name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Public XFER release version
        required: true
        type: string
      tag:
        description: Reserved Git tag
        required: true
        type: string
      commit:
        description: Bot-authored release commit
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: publish-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    env:
      XFER_EXPECTED_VERSION: ${{ inputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: xfer
            artifact: xfer-linux-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: xfer
            artifact: xfer-linux-x86_64-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: xfer
            artifact: xfer-linux-aarch64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            binary: xfer
            artifact: xfer-linux-aarch64-musl
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: xfer
            artifact: xfer-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: xfer
            artifact: xfer-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: xfer.exe
            artifact: xfer-windows-x86_64.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            binary: xfer.exe
            artifact: xfer-windows-aarch64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.commit }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux cross toolchain
        if: runner.os == 'Linux' && matrix.target != 'x86_64-unknown-linux-gnu'
        uses: taiki-e/setup-cross-toolchain-action@v1.41.0
        with:
          target: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          key: release-${{ matrix.target }}

      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Verify compiled release version
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: |
          reported_version="$("target/${{ matrix.target }}/release/${{ matrix.binary }}" --version)"
          expected_version="xfer ${XFER_EXPECTED_VERSION}"
          if [[ "$reported_version" != "$expected_version" ]]; then
            echo "Expected '$expected_version', got '$reported_version'" >&2
            exit 1
          fi

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.artifact }}"
          (
            cd dist
            openssl dgst -sha256 -r "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          )

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.commit }}

      - uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Add install scripts
        shell: bash
        run: |
          cp scripts/install.sh scripts/install.ps1 dist/
          chmod 0755 dist/install.sh
          (
            cd dist
            openssl dgst -sha256 -r install.sh > install.sh.sha256
            openssl dgst -sha256 -r install.ps1 > install.ps1.sha256
          )

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_COMMIT: ${{ inputs.commit }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          tagged_commit="$(
            gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" \
              --jq '.object.sha'
          )"
          if [[ "$tagged_commit" != "$RELEASE_COMMIT" ]]; then
            echo "Expected $RELEASE_TAG at $RELEASE_COMMIT, got $tagged_commit" >&2
            exit 1
          fi
          gh release create "$RELEASE_TAG" dist/* \
            --verify-tag \
            --title "XFER $RELEASE_VERSION" \
            --generate-notes

  cleanup_failed_tag:
    name: Clean up failed release reservation
    if: ${{ always() && needs.publish.result != 'success' }}
    needs:
      - build
      - publish
    runs-on: ubuntu-latest
    steps:
      - name: Delete this run's unused reserved tag
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_COMMIT: ${{ inputs.commit }}
          RELEASE_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            exit 0
          fi
          reserved_sha="$(
            gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" \
              --jq '.object.sha' 2>/dev/null || true
          )"
          if [[ "$reserved_sha" == "$RELEASE_COMMIT" ]]; then
            gh api --method DELETE \
              "repos/${GITHUB_REPOSITORY}/git/refs/tags/${RELEASE_TAG}"
          fi
