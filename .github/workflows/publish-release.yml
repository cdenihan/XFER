name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Public XFER release version
        required: true
        type: string
      tag:
        description: Reserved Git tag
        required: true
        type: string
      commit:
        description: Bot-authored release commit
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: publish-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    uses: cdenihan/rust-cli-release/.github/workflows/publish-release.yml@v1.3.0
    with:
      version: ${{ inputs.version }}
      tag: ${{ inputs.tag }}
      commit: ${{ inputs.commit }}
      binary-name: xfer
      display-name: XFER
      cargo-package: xfer
      environment-prefix: XFER
    secrets:
      dependency_token: ${{ secrets.RUST_CLI_RELEASE_TOKEN }}
